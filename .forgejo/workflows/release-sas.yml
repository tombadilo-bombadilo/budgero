name: release-sas

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-sas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-sas:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Docker CLI + Buildx
        run: |
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /usr/share/keyrings/docker.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable" > /etc/apt/sources.list.d/docker.list
          apt-get update && apt-get install -y docker-ce-cli docker-buildx-plugin

      - name: Setup QEMU for cross-platform builds
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release SaaS image
        run: pnpm run release:sas
        env:
          DOCKER_USERNAME: budgero
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_PLATFORMS: linux/amd64
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
