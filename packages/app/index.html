<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Budgero Web App</title>
    <meta
      name="description"
      content="Access Budgero securely. Manage your zero-based budget with private, encrypted sync or work offline with Core."
    />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="application-name" content="Budgero" />

    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Budgero" />
    <!-- Helps with virtual keyboard layout shifts on iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo_192.png" />

    <!-- Microsoft PWA Meta Tags -->
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-TileImage" content="/logo_144.png" />

    <!-- Additional PWA Icons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />

    <style>
      :root {
        color-scheme: dark light;
      }
      #budgero-preload {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #000000;
        color: #f8fafc;
        font-family:
          'Inter',
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        transition:
          opacity 220ms ease,
          visibility 220ms ease;
      }
      #budgero-preload.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      #budgero-preload .preload-logo {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 1.25rem;
        object-fit: cover;
      }
      #budgero-preload .preload-progress {
        position: relative;
        width: 12.5rem;
        height: 0.375rem;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.25);
      }
      #budgero-preload .preload-progress::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(59, 130, 246, 0.05),
          rgba(59, 130, 246, 0.9),
          rgba(56, 189, 248, 0.2)
        );
        transform: translateX(-100%);
        animation: budgero-progress 1.4s ease-in-out infinite;
      }
      #budgero-preload .preload-text {
        font-size: 0.875rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.75);
      }
      @keyframes budgero-progress {
        0% {
          transform: translateX(-100%);
        }
        60% {
          transform: translateX(0%);
        }
        100% {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <div id="budgero-preload">
      <img class="preload-logo" src="/logo_128.png" alt="Budgero logo" />
      <div class="preload-text">Loading Budgero…</div>
      <div class="preload-progress" role="presentation"></div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var search = window.location.search || '';
          if (!search) return;
          var params = new URLSearchParams(search);
          var intent = params.get('intent');
          if (!intent) return;
          window.localStorage.setItem('budgero_startup_intent', intent);
          params.delete('intent');
          var nextSearch = params.toString();
          var nextUrl =
            window.location.pathname + (nextSearch ? '?' + nextSearch : '') + window.location.hash;
          if (
            nextUrl !==
            window.location.pathname + window.location.search + window.location.hash
          ) {
            window.history.replaceState(null, document.title, nextUrl);
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function (w, d) {
        if (w.Quackback) return;
        w.Quackback = function () {
          (w.Quackback.q = w.Quackback.q || []).push(arguments);
        };
        var s = d.createElement('script');
        s.async = true;
        s.src = 'https://feedback.budgero.app/api/widget/sdk.js';
        d.head.appendChild(s);
      })(window, document);

      // We open the widget from our own in-app feedback button (HeaderBar /
      // MobileTopBar), so suppress Quackback's floating launcher — it has no
      // room on mobile and overlaps the app chrome.
      Quackback('init', { launcher: false });
    </script>
  </body>
</html>
