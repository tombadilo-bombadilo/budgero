version: '2'
sql:
  - engine: 'sqlite'
    queries: 'internal/adapter/driven/sqlite/queries'
    schema: 'internal/adapter/driven/sqlite/migrations'
    gen:
      go:
        package: 'sqlc'
        out: 'internal/adapter/driven/sqlite/sqlc'
        emit_json_tags: true
        emit_empty_slices: true
